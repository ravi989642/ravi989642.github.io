    <header class="header">

                    <p>Learn 10 Words Every Day</p>
                </div>
            </div>
            <div class="header-stats">

                <div class="stat-box"><div class="label">Learned</div><div class="value" id="learned">0</div></div>
                <div class="stat-box"><div class="label">Day</div><div class="value" id="day-num">1</div></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="mode-toggle">
            <button class="toggle-btn active" onclick="setMode('learn', this)">📝 Learn Daily</button>
            <button class="toggle-btn" onclick="setMode('review', this)">📖 Review All</button>
            <button class="toggle-btn" onclick="setMode('write', this)">✍️ Write Practice</button>
        </div>

        <!-- Learn Mode -->
        <div id="learn-mode">
            <div class="progress-section">
                <div class="progress-header"><span>Today's Progress</span><span id="learn-progress-text">0/10</span></div>
                <div class="progress-bar"><div class="progress-fill" id="learn-progress-bar" style="width:0%"></div></div>
            </div>
            <div class="word-card" id="word-card"></div>
            <div class="controls">
                <button class="btn btn-secondary" onclick="prevWord()">← Previous</button>
                <button class="btn btn-success" onclick="markLearned()">✅ Mark Learned</button>
                <button class="btn btn-primary" onclick="nextWord()">Next →</button>
            </div>
        </div>

        <!-- Review Mode -->
        <div id="review-mode" style="display:none">
            <div class="streak-box">
                <div class="streak-number" id="review-streak">0</div>
                <div class="streak-label">🔥 Day Streak</div>
            </div>
            <div id="review-list"></div>
        </div>

        <!-- Write Practice Mode -->
        <div id="write-mode" style="display:none">
            <div class="progress-section">
                <div class="progress-header"><span>Write Practice</span><span id="write-progress-text">0/10</span></div>
                <div class="progress-bar"><div class="progress-fill" id="write-progress-bar" style="width:0%"></div></div>
            </div>
            <div class="word-card" id="write-card"></div>
            <div class="controls">
                <button class="btn btn-secondary" onclick="prevWrite()">← Previous</button>
                <button class="btn btn-check" onclick="checkAnswer()">✓ Check Answer</button>
                <button class="btn btn-primary" onclick="nextWrite()">Next →</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>📚 Daily Synonyms | Vocabulary Builder | SSC/Bank/Competitive Exams</p>
        <p style="margin-top:0.5rem">Practice daily to master 3000+ words!</p>
    </footer>

var currentDay = 1;
var currentWord = 0;
var learnedWords = [];
var streak = 0;
var writeProgress = [];
var currentWriteWord = 0;

function init() {
    loadProgress();
    updateStats();
    renderLearnCard();
}

function loadProgress() {
    var saved = localStorage.getItem('synonyms_progress');
    if (saved) {
        var data = JSON.parse(saved);
        learnedWords = data.learned || [];
        streak = data.streak || 0;
        currentDay = data.currentDay || 1;
    }
}

function saveProgress() {
    var data = {
        learned: learnedWords,
        streak: streak,
        currentDay: currentDay
    };
    localStorage.setItem('synonyms_progress', JSON.stringify(data));
}

function updateStats() {
    document.getElementById('streak').textContent = streak;
    document.getElementById('learned').textContent = learnedWords.length;
    document.getElementById('day-num').textContent = currentDay;
}

function getTodayWords() {
    var words = [];
    for (var i = 0; i < allWords.length; i++) {
        if (allWords[i].day === currentDay) {
            words.push(allWords[i]);
        }
    }
    return words;
}

function renderLearnCard() {
    var words = getTodayWords();
    if (words.length === 0) {
        document.getElementById('word-card').innerHTML = 
            '<div class="empty-state">' +
                '<div class="empty-state-icon">&#127881;</div>' +
                '<h2>All words learned for today!</h2>' +
                '<p>Come back tomorrow for 10 new words.</p>' +
            '</div>';
        return;
    }

    var w = words[currentWord];
    var card = document.getElementById('word-card');

    var synHtml = '';
    for (var i = 0; i < w.synonyms.length; i++) {
        synHtml = synHtml + '<span class="synonym-tag">' + w.synonyms[i] + '</span>';
    }

    var isLearned = false;
    for (var i = 0; i < learnedWords.length; i++) {
        if (learnedWords[i] === w.word) {
            isLearned = true;
            break;
        }
    }

    card.innerHTML = 
        '<div class="word-header">' +
            '<span class="word-badge">Word ' + (currentWord + 1) + '/10</span>' +
            '<span class="word-number">Day ' + w.day + '</span>' +
        '</div>' +
        '<div class="word-title">' + w.word + '</div>' +
        '<div class="synonyms-box">' +
            '<div class="synonyms-title">&#128214; Synonyms:</div>' +
            '<div class="synonyms-list">' + synHtml + '</div>' +
        '</div>' +
        '<div class="hint-box">' +
            '&#128161; <strong>Tip:</strong> Type any synonym in the Write Practice tab to reinforce memory!' +
        '</div>';

    var progress = ((currentWord + 1) / words.length) * 100;
    document.getElementById('learn-progress-bar').style.width = progress + '%';
    document.getElementById('learn-progress-text').textContent = (currentWord + 1) + '/' + words.length;

    var btn = document.querySelector('#learn-mode .btn-success');
    if (btn) {
        btn.textContent = isLearned ? '&#9989; Already Learned' : '&#9989; Mark Learned';
        btn.style.opacity = isLearned ? '0.7' : '1';
    }
}

function nextWord() {
    var words = getTodayWords();
    if (currentWord < words.length - 1) {
        currentWord++;
        renderLearnCard();
    }
}

function prevWord() {
    if (currentWord > 0) {
        currentWord--;
        renderLearnCard();
    }
}

function markLearned() {
    var words = getTodayWords();
    var w = words[currentWord];

    var alreadyLearned = false;
    for (var i = 0; i < learnedWords.length; i++) {
        if (learnedWords[i] === w.word) {
            alreadyLearned = true;
            break;
        }
    }

    if (!alreadyLearned) {
        learnedWords.push(w.word);
        streak++;
        saveProgress();
        updateStats();
    }

    renderLearnCard();

    // Auto advance after marking
    if (currentWord < words.length - 1) {
        setTimeout(function() {
            currentWord++;
            renderLearnCard();
        }, 500);
    }
}

function renderReview() {
    var list = document.getElementById('review-list');
    document.getElementById('review-streak').textContent = streak;

    if (learnedWords.length === 0) {
        list.innerHTML = 
            '<div class="empty-state">' +
                '<div class="empty-state-icon">&#128218;</div>' +
                '<h2>No words learned yet!</h2>' +
                '<p>Start learning in the Learn Daily tab.</p>' +
            '</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < learnedWords.length; i++) {
        var word = learnedWords[i];
        var wordData = null;
        for (var j = 0; j < allWords.length; j++) {
            if (allWords[j].word === word) {
                wordData = allWords[j];
                break;
            }
        }
        if (wordData) {
            var synText = '';
            for (var k = 0; k < wordData.synonyms.length; k++) {
                synText = synText + wordData.synonyms[k];
                if (k < wordData.synonyms.length - 1) synText = synText + ', ';
            }
            html = html + 
                '<div class="review-card">' +
                    '<div class="review-word">' + wordData.word + '</div>' +
                    '<div class="review-synonyms">' + synText + '</div>' +
                    '<div class="review-date">Day ' + wordData.day + '</div>' +
                '</div>';
        }
    }
    list.innerHTML = html;
}

function renderWriteCard() {
    var words = getTodayWords();
    if (words.length === 0) {
        document.getElementById('write-card').innerHTML = 
            '<div class="empty-state">' +
                '<div class="empty-state-icon">&#9997;</div>' +
                '<h2>No words for today!</h2>' +
            '</div>';
        return;
    }

    var w = words[currentWriteWord];
    var card = document.getElementById('write-card');

    card.innerHTML = 
        '<div class="word-header">' +
            '<span class="word-badge">Write ' + (currentWriteWord + 1) + '/10</span>' +
            '<span class="word-number">Day ' + w.day + '</span>' +
        '</div>' +
        '<div class="word-title">' + w.word + '</div>' +
        '<div class="write-section">' +
            '<label class="write-label">Type any synonym for this word:</label>' +
            '<input type="text" class="write-input" id="write-input" placeholder="Type a synonym here..." onkeypress="if(event.keyCode===13)checkAnswer()">' +
            '<div class="write-feedback" id="write-feedback"></div>' +
        '</div>';

    var progress = ((currentWriteWord + 1) / words.length) * 100;
    document.getElementById('write-progress-bar').style.width = progress + '%';
    document.getElementById('write-progress-text').textContent = (currentWriteWord + 1) + '/' + words.length;
}

function checkAnswer() {
    var words = getTodayWords();
    var w = words[currentWriteWord];
    var input = document.getElementById('write-input');
    var feedback = document.getElementById('write-feedback');

    if (!input || !input.value.trim()) {
        feedback.textContent = 'Please type a synonym first!';
        feedback.className = 'write-feedback wrong';
        return;
    }

    var userAnswer = input.value.trim().toLowerCase();
    var correct = false;

    for (var i = 0; i < w.synonyms.length; i++) {
        if (w.synonyms[i].toLowerCase().indexOf(userAnswer) !== -1 || 
            userAnswer.indexOf(w.synonyms[i].toLowerCase()) !== -1) {
            correct = true;
            break;
        }
    }

    if (correct) {
        input.className = 'write-input correct';
        feedback.textContent = '&#9989; Correct! Well done!';
        feedback.className = 'write-feedback correct';

        // Mark as learned if not already
        var alreadyLearned = false;
        for (var i = 0; i < learnedWords.length; i++) {
            if (learnedWords[i] === w.word) {
                alreadyLearned = true;
                break;
            }
        }
        if (!alreadyLearned) {
            learnedWords.push(w.word);
            streak++;
            saveProgress();
            updateStats();
        }
    } else {
        input.className = 'write-input wrong';
        var hint = w.synonyms[0];
        feedback.innerHTML = '&#10060; Try again! Hint: Starts with "' + hint.charAt(0) + '"';
        feedback.className = 'write-feedback wrong';
    }
}

function nextWrite() {
    var words = getTodayWords();
    if (currentWriteWord < words.length - 1) {
        currentWriteWord++;
        renderWriteCard();
    }
}

function prevWrite() {
    if (currentWriteWord > 0) {
        currentWriteWord--;
        renderWriteCard();
    }
}

function setMode(mode, btn) {
    var btns = document.querySelectorAll('.toggle-btn');
    for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
    btn.classList.add('active');

    document.getElementById('learn-mode').style.display = 'none';
    document.getElementById('review-mode').style.display = 'none';
    document.getElementById('write-mode').style.display = 'none';

    if (mode === 'learn') {
        document.getElementById('learn-mode').style.display = 'block';
        renderLearnCard();
    } else if (mode === 'review') {
        document.getElementById('review-mode').style.display = 'block';
        renderReview();
    } else if (mode === 'write') {
        document.getElementById('write-mode').style.display = 'block';
        renderWriteCard();
    }
}

// Initialize
window.onload = function() {
    init();
};
</script>
</body>
</html>
