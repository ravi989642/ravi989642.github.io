<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कृतिदेव-10 से यूनिकोड एवं यूनिकोड से कृतिदेव-10 में परावर्तन</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #4a7c7e;
            min-height: 100vh;
            padding: 10px;
        }
        .header {
            text-align: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .converter-box {
            display: flex;
            gap: 0;
            border: 2px solid #c0392b;
            background: white;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }
        .panel-header {
            background: #c0392b;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header .actions {
            display: flex;
            gap: 8px;
        }
        .panel-header button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 3px;
            transition: background 0.2s;
        }
        .panel-header button:hover {
            background: rgba(255,255,255,0.2);
        }
        textarea {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            padding: 15px;
            font-size: 18px;
            resize: none;
            font-family: 'Mangal', 'Arial Unicode MS', sans-serif;
        }
        #krutidevInput, #krutidevOutput {
            font-family: 'Kruti Dev 010', 'KrutiDev010', monospace;
        }
        .divider {
            width: 2px;
            background: #c0392b;
        }
        .button-bar {
            display: flex;
            justify-content: space-around;
            background: #c0392b;
            padding: 10px;
            gap: 20px;
        }
        .convert-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .convert-btn:hover {
            background: #0056b3;
        }
        .convert-btn:active {
            transform: translateY(1px);
        }
        @media (max-width: 768px) {
            .converter-box {
                flex-direction: column;
            }
            .divider {
                width: 100%;
                height: 2px;
            }
            .header {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">कृतिदेव-10 से यूनिकोड एवं यूनिकोड से कृतिदेव-10 में परावर्तन</div>
    
    <div class="container">
        <div class="converter-box">
            <!-- Krutidev Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>कृतिदेव</span>
                    <div class="actions">
                        <button onclick="clearKrutidev()" title="Clear">🗑️</button>
                        <button onclick="copyKrutidev()" title="Copy">📋</button>
                    </div>
                </div>
                <textarea id="krutidevInput" placeholder="कृतिदेव में टाइप करें..."></textarea>
            </div>
            
            <div class="divider"></div>
            
            <!-- Unicode Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>यूनिकोड</span>
                    <div class="actions">
                        <button onclick="clearUnicode()" title="Clear">🗑️</button>
                        <button onclick="copyUnicode()" title="Copy">📋</button>
                    </div>
                </div>
                <textarea id="unicodeInput" placeholder="यूनिकोड में टाइप करें..."></textarea>
            </div>
        </div>
        
        <div class="button-bar">
            <button class="convert-btn" onclick="convertToUnicode()">Convert to Unicode</button>
            <button class="convert-btn" onclick="convertToKrutidev()">Convert to Krutidev</button>
        </div>
    </div>

    <script>
        // ========== KRUTIDEV → UNICODE MAPPING ==========
        const krutiToUniMap = {
            "ñ": "॰", "Q+Z": "QZ+", "sas": "sa", "aa": "a", ")Z": "र्द्ध", "ZZ": "Z",
            "‘": "\"", "’": "\"", "“": "'", "”": "'", "å": "०", "ƒ": "१", "„": "२",
            "…": "३", "†": "४", "‡": "५", "ˆ": "६", "‰": "७", "Š": "८", "‹": "९",
            "¶+": "फ़्", "d+": "क़", "[+k": "ख़", "[+": "ख़्", "x+": "ग़", "T+": "ज़्",
            "t+": "ज़", "M+": "ड़", "<+": "ढ़", "Q+": "फ़", ";+": "य़", "j+": "ऱ",
            "u+": "ऩ", "Ùk": "त्त", "Ù": "त्त्", "Dr": "क्त", "–": "दृ", "—": "कृ",
            "é": "न्न", "™": "न्न्", "=kk": "=k", "f=k": "f=", "à": "ह्न", "á": "ह्य",
            "â": "हृ", "ã": "ह्म", "ºz": "ह्र", "º": "ह्", "í": "द्द", "{k": "क्ष",
            "{": "क्ष्", "=": "त्र", "«": "त्र्", "Nî": "छ्य", "Vî": "ट्य", "Bî": "ठ्य",
            "Mî": "ड्य", "<î": "ढ्य", "|": "द्य", "K": "ज्ञ", "}": "द्व", "J": "श्र",
            "Vª": "ट्र", "Mª": "ड्र", "<ªª": "ढ्र", "Nª": "छ्र", "Ø": "क्र", "Ý": "फ्र",
            "nzZ": "र्द्र", "æ": "द्र", "ç": "प्र", "Á": "प्र", "xz": "ग्र", "#": "रु",
            ":": "रू", "v‚": "ऑ", "vks": "ओ", "vkS": "औ", "vk": "आ", "v": "अ",
            "b±": "ईं", "Ã": "ई", "bZ": "ई", "b": "इ", "m": "उ", "Å": "ऊ",
            ",s": "ऐ", ",": "ए", "_": "ऋ", "ô": "क्क", "d": "क", "Dk": "क", "D": "क्",
            "[k": "ख", "[": "ख्", "x": "ग", "Xk": "ग", "X": "ग्", "Ä": "घ", "?k": "घ",
            "?": "घ्", "³": "ङ", "pkS": "चै", "p": "च्", "Pk": "च", "P": "छ",
            "N": "ज्", "t": "ज", "Tk": "झ्", "T": "झ", ">": "ञ", "÷": "ट्ट",
            "¥": "ट्ठ", "ê": "ड्ड", "ë": "कृ", "V": "भ", "B": "्य", "ì": "ड्ढ",
            "ï": "झ्", "M+": "क्र", "<+": "त्त्", "M": "श", "<": "श्", ".k": "ॉ",
            ".": "ो", "r": "ौ", "Rk": "ा", "R": "ी", "Fk": "ु", "F": "ू", ")": "ृ",
            "n": "े", "/k": "ै", "èk": "ं", "/": "ँ", "Ë": "ः", "è": "ॅ",
            "u": "ऽ", "Uk": "ऽ", "U": "ऽ", "i": "ऽ", "Ik": "ऽ", "I": "ऽ",
            "Q": "ऽ", "¶": "ऽ", "c": "ऽ", "Ck": "ऽ", "C": "ऽ", "Hk": "ऽ",
            "H": "ऽ", "e": "ऽ", "Ek": "ऽ", "E": "ऽ", ";": "ऽ", "¸": "ऽ",
            "j": "ऽ", "y": "ऽ", "Yk": "ऽ", "Y": "ऽ", "G": "ऽ", "o": "ऽ",
            "Ok": "ऽ", "O": "ऽ", "'k": "ऽ", "'": "ऽ", "\"k": "ऽ", "\"": "ऽ",
            "l": "ऽ", "Lk": "ऽ", "L": "ऽ", "g": "ऽ", "È": "ऽ", "z": "ऽ",
            "Ì": "ऽ", "Í": "ऽ", "Î": "ऽ", "Ï": "ऽ", "Ñ": "ऽ", "Ò": "ऽ",
            "Ó": "ऽ", "Ô": "ऽ", "Ö": "ऽ", "Ø": "ऽ", "Ù": "ऽ", "Ük": "ऽ",
            "Ü": "ऽ", "‚": "ऽ", "ks": "ऽ", "kS": "ऽ", "k": "ऽ", "h": "ऽ",
            "q": "ऽ", "w": "ऽ", "`": "ऽ", "s": "ऽ", "S": "ऽ", "a": "ऽ",
            "¡": "ऽ", "%": "ऽ", "W": "ऽ", "•": "ऽ", "·": "ऽ", "∙": "ऽ",
            "~j": "ऽ", "~": "ऽ", "\\": "ऽ", "+": "ऽ", " ः": "ऽ", "^": "ऽ",
            "*": "ऽ", "Þ": "ऽ", "ß": "ऽ", "(": "ऽ", "¼": "ऽ", "½": "ऽ",
            "¿": "ऽ", "À": "ऽ", "¾": "ऽ", "A": "ऽ", "-": "ऽ", "&": "ऽ",
            "Œ": "ऽ", "]": "ऽ", "~ ": "ऽ", "@": "ऽ"
        };

        // ========== UNICODE → KRUTIDEV MAPPING ==========
        const uniToKrutiMap = {
            "॰": "ñ", "QZ+": "Q+Z", "sa": "sas", "a": "aa", "र्द्ध": ")Z", "Z": "ZZ",
            "\"": "‘", "'": "“", "०": "å", "१": "ƒ", "२": "„", "३": "…", "४": "†",
            "५": "‡", "६": "ˆ", "७": "‰", "८": "Š", "९": "‹", "फ़्": "¶+", "क़": "d+",
            "ख़": "[+k", "ख़्": "[+", "ग़": "x+", "ज़्": "T+", "ज़": "t+", "ड़": "M+",
            "ढ़": "<+", "फ़": "Q+", "य़": ";+", "ऱ": "j+", "ऩ": "u+", "त्त": "Ùk",
            "त्त्": "Ù", "क्त": "Dr", "दृ": "–", "कृ": "—", "न्न": "é", "न्न्": "™",
            "=k": "=kk", "f=": "f=", "ह्न": "à", "ह्य": "á", "हृ": "â", "ह्म": "ã",
            "ह्र": "ºz", "ह्": "º", "द्द": "í", "क्ष": "{k", "क्ष्": "{", "त्र": "=",
            "त्र्": "«", "छ्य": "Nî", "ट्य": "Vî", "ठ्य": "Bî", "ड्य": "Mî", "ढ्य": "<î",
            "द्य": "|", "ज्ञ": "K", "द्व": "}", "श्र": "J", "ट्र": "Vª", "ड्र": "Mª",
            "ढ्र": "<ªª", "छ्र": "Nª", "क्र": "Ø", "फ्र": "Ý", "र्द्र": "nzZ", "द्र": "æ",
            "प्र": "ç", "ग्र": "xz", "रु": "#", "रू": ":", "ऑ": "v‚", "ओ": "vks",
            "औ": "vkS", "आ": "vk", "अ": "v", "ईं": "b±", "ई": "Ã", "इ": "b", "उ": "m",
            "ऊ": "Å", "ऐ": ",s", "ए": ",", "ऋ": "_", "क्क": "ô", "क": "d", "क्": "D",
            "ख": "[k", "ख्": "[", "ग": "x", "ग्": "X", "घ": "Ä", "घ्": "?k", "ङ": "³",
            "चै": "pkS", "च्": "p", "च": "Pk", "छ": "P", "ज्": "N", "ज": "t", "झ्": "Tk",
            "झ": "T", "ञ": ">", "ट्ट": "÷", "ट्ठ": "¥", "ड्ड": "ê", "कृ": "ë", "भ": "V",
            "्य": "B", "ड्ढ": "ì", "झ्": "ï", "श": "M", "श्": "<", "ॉ": ".k", "ो": ".",
            "ौ": "r", "ा": "Rk", "ी": "R", "ु": "Fk", "ू": "F", "ृ": ")", "े": "n",
            "ै": "/k", "ं": "èk", "ँ": "/", "ः": "Ë", "ॅ": "è", "ऽ": "u", "्र": "z",
            "़": "È"
        };

        // ========== CONVERSION: KRUTIDEV → UNICODE ==========
        function convertToUnicode() {
            let text = document.getElementById('krutidevInput').value;
            if (!text.trim()) return;
            
            let modified = text;
            
            // Step 1: Handle "f" (ि) - reposition before the consonant
            // In Krutidev, 'f' comes AFTER the consonant it modifies (e.g., "kf" = कि)
            // In Unicode, 'ि' comes BEFORE the consonant
            modified = " " + modified + " ";
            let pos = modified.lastIndexOf("f");
            while (pos !== -1 && pos > 0) {
                // Swap f with the character before it
                modified = modified.substring(0, pos - 1) + "f" + modified.charAt(pos - 1) + modified.substring(pos + 1);
                pos = modified.lastIndexOf("f", pos - 2);
            }
            modified = modified.replace(/f/g, "ि");
            modified = modified.trim();
            
            // Step 2: Handle "Z" (्र) - half R
            // In Krutidev, 'Z' comes after the consonant cluster
            // In Unicode, '्र' comes after the consonant
            modified = " " + modified + " ";
            let posR = modified.indexOf("Z");
            let matras = ["‚", "ks", "kS", "k", "h", "q", "w", "`", "s", "S", "a", "¡", "%", "W", "·", "~ ", "~"];
            while (posR !== -1) {
                modified = modified.substring(0, posR) + modified.substring(posR + 1);
                let beforeChar = modified.charAt(posR - 1);
                if (matras.includes(beforeChar)) {
                    modified = modified.substring(0, posR - 2) + "र्" + modified.substring(posR - 2);
                } else {
                    modified = modified.substring(0, posR - 1) + "र्" + modified.substring(posR - 1);
                }
                posR = modified.indexOf("Z");
            }
            modified = modified.trim();
            
            // Step 3: Replace Krutidev characters with Unicode (longest first)
            let keys = Object.keys(krutiToUniMap).sort((a, b) => b.length - a.length);
            for (let key of keys) {
                let regex = new RegExp(escapeRegex(key), "g");
                modified = modified.replace(regex, krutiToUniMap[key]);
            }
            
            document.getElementById('unicodeInput').value = modified;
        }

        // ========== CONVERSION: UNICODE → KRUTIDEV ==========
        function convertToKrutidev() {
            let text = document.getElementById('unicodeInput').value;
            if (!text.trim()) return;
            
            let modified = text;
            
            // Step 1: Replace Unicode with Krutidev (longest first)
            let keys = Object.keys(uniToKrutiMap).sort((a, b) => b.length - a.length);
            for (let key of keys) {
                let regex = new RegExp(escapeRegex(key), "g");
                modified = modified.replace(regex, uniToKrutiMap[key]);
            }
            
            // Step 2: Handle "ि" (f) - reposition after the consonant
            // In Unicode, 'ि' comes BEFORE the consonant
            // In Krutidev, 'f' comes AFTER the consonant
            modified = " " + modified + " ";
            let pos = modified.indexOf("f");
            while (pos !== -1) {
                // f should be after the character that follows it
                modified = modified.substring(0, pos) + modified.charAt(pos + 1) + "f" + modified.substring(pos + 2);
                pos = modified.indexOf("f", pos + 2);
            }
            modified = modified.trim();
            
            // Step 3: Handle "र्" (Z) - half R
            modified = " " + modified + " ";
            let posR = modified.indexOf("र्");
            let matras = ["‚", "ks", "kS", "k", "h", "q", "w", "`", "s", "S", "a", "¡", "%", "W", "·", "~ ", "~"];
            while (posR !== -1) {
                modified = modified.substring(0, posR) + modified.substring(posR + 2);
                let afterChar = modified.charAt(posR);
                if (matras.includes(afterChar)) {
                    modified = modified.substring(0, posR + 2) + "Z" + modified.substring(posR + 2);
                } else {
                    modified = modified.substring(0, posR + 1) + "Z" + modified.substring(posR + 1);
                }
                posR = modified.indexOf("र्");
            }
            modified = modified.trim();
            
            document.getElementById('krutidevInput').value = modified;
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // ========== UTILITY FUNCTIONS ==========
        function clearKrutidev() {
            document.getElementById('krutidevInput').value = '';
        }
        function clearUnicode() {
            document.getElementById('unicodeInput').value = '';
        }
        function copyKrutidev() {
            let el = document.getElementById('krutidevInput');
            el.select();
            document.execCommand('copy');
        }
        function copyUnicode() {
            let el = document.getElementById('unicodeInput');
            el.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
