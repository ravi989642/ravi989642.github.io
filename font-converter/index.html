<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #4a7c7e;
            min-height: 100vh;
            padding: 10px;

        .header {
            text-align: center;

            font-size: 22px;

            padding: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .converter-box {
            display: flex;
            gap: 0;
            border: 2px solid #c0392b;
            background: white;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }
        .panel-header {
            background: #c0392b;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header .actions { display: flex; gap: 8px; }
        .panel-header button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .panel-header button:hover { background: rgba(255,255,255,0.2); }
        textarea {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            padding: 15px;
            font-size: 18px;
            resize: none;
            font-family: 'Mangal', 'Arial Unicode MS', sans-serif;
        }

        .divider { width: 2px; background: #c0392b; }
        .button-bar {
            display: flex;
            justify-content: space-around;
            background: #c0392b;
            padding: 10px;
            gap: 20px;
        }
        .convert-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .converter-box { flex-direction: column; }
            .divider { width: 100%; height: 2px; }
            .header { font-size: 16px; }
        }

];

const array_two = [
    "॰","QZ+","sa","a","र्द्ध","Z","\"","\"","'","'",
    "०","१","२","३","४","५","६","७","८","९",

function convertToUnicode() {
    let modified_substring = document.getElementById("krutidevInput").value;
    if (!modified_substring.trim()) return;

    let text_size = modified_substring.length;
    let processed_text = "";
    let sthiti1 = 0, sthiti2 = 0, chale_chalo = 1;
    let max_text_size = 6000;

    while (chale_chalo == 1) {
        sthiti1 = sthiti2;
        if (sthiti2 < (text_size - max_text_size)) {
            sthiti2 += max_text_size;
            while (modified_substring.charAt(sthiti2) != ' ') { sthiti2--; }
        } else {
            sthiti2 = text_size;
            chale_chalo = 0;
        }

        let substr = modified_substring.substring(sthiti1, sthiti2);
        processed_text += convertKrutiToUnicodeChunk(substr);
    }

    document.getElementById("unicodeInput").value = processed_text;
}

function convertKrutiToUnicodeChunk(modified_substring) {
    if (modified_substring.trim() === "") return "";

    // Replace symbols
    let array_one_length = array_one.length;
    for (let input_symbol_idx = 0; input_symbol_idx < array_one_length; input_symbol_idx++) {
        let idx = 0;
        while (idx != -1) {
            modified_substring = modified_substring.replace(array_one[input_symbol_idx], array_two[input_symbol_idx]);
            idx = modified_substring.indexOf(array_one[input_symbol_idx]);
        }
    }

    // Special glyph: ± (reph + anusvar)
    modified_substring = modified_substring.replace(/±/g, "Zं");

    // Special glyph: Æ
    modified_substring = modified_substring.replace(/Æ/g, "र्f");

    // Handle "f" (ि matra) - move it after the next character
    let position_of_i = modified_substring.indexOf("f");
    while (position_of_i != -1) {
        let charecter_next_to_i = modified_substring.charAt(position_of_i + 1);
        let charecter_to_be_replaced = "f" + charecter_next_to_i;
        modified_substring = modified_substring.replace(charecter_to_be_replaced, charecter_next_to_i + "ि");
        position_of_i = modified_substring.indexOf("f", position_of_i + 1);
    }

    // Special glyphs: Ç and É
    modified_substring = modified_substring.replace(/Ç/g, "fa");
    modified_substring = modified_substring.replace(/É/g, "र्fa");

    // Handle "fa" (िं matra) - move it 2 positions forward
    position_of_i = modified_substring.indexOf("fa");
    while (position_of_i != -1) {
        let charecter_next_to_ip2 = modified_substring.charAt(position_of_i + 2);
        let charecter_to_be_replaced = "fa" + charecter_next_to_ip2;
        modified_substring = modified_substring.replace(charecter_to_be_replaced, charecter_next_to_ip2 + "िं");
        position_of_i = modified_substring.indexOf("fa", position_of_i + 2);
    }

    // Special glyph: Ê
    modified_substring = modified_substring.replace(/Ê/g, "ीZ");

    // Fix wrong ee (ि्) on half-letters
    let position_of_wrong_ee = modified_substring.indexOf("ि्");
    while (position_of_wrong_ee != -1) {
        let consonent_next_to_wrong_ee = modified_substring.charAt(position_of_wrong_ee + 2);
        let charecter_to_be_replaced = "ि्" + consonent_next_to_wrong_ee;
        modified_substring = modified_substring.replace(charecter_to_be_replaced, "्" + consonent_next_to_wrong_ee + "ि");
        position_of_wrong_ee = modified_substring.indexOf("ि्", position_of_wrong_ee + 2);
    }

    // Handle "Z" (half R / reph)
    let set_of_matras = "अ आ इ ई उ ऊ ए ऐ ओ औ ा ि ी ु ू ृ े ै ो ौ ं : ँ ॅ";
    let position_of_R = modified_substring.indexOf("Z");
    while (position_of_R > 0) {
        let probable_position_of_half_r = position_of_R - 1;
        let charecter_at_probable_position_of_half_r = modified_substring.charAt(probable_position_of_half_r);

        while (set_of_matras.indexOf(charecter_at_probable_position_of_half_r) >= 0) {
            probable_position_of_half_r = probable_position_of_half_r - 1;
            charecter_at_probable_position_of_half_r = modified_substring.charAt(probable_position_of_half_r);
        }

        let charecter_to_be_replaced = modified_substring.substring(probable_position_of_half_r, position_of_R + 1);
        let new_replacement_string = "र्" + modified_substring.substring(probable_position_of_half_r, position_of_R);
        modified_substring = modified_substring.replace(charecter_to_be_replaced, new_replacement_string);
        position_of_R = modified_substring.indexOf("Z");
    }

    return modified_substring;
}


// ==================== UNICODE → KRUTIDEV ====================

const uni_array_one = [
    "‘","’","“","”","(",")","{","}","=","।","?","-","µ","॰",",",".","् ",
    "०","१","२","३","४","५","६","७","८","९","x",
    "फ़्","क़","ख़","ग़","ज़्","ज़","ड़","ढ़","फ़","य़","ऱ","ऩ",
    "त्त्","त्त","क्त","दृ","कृ",
    "ह्न","ह्य","हृ","ह्म","ह्र","ह्","द्द","क्ष्","क्ष","त्र्","त्र","ज्ञ",

    "्र",
    "ओ","औ","आ","अ","ईं","ई","ई","इ","उ","ऊ","ऐ","ए","ऋ",

    "चै","च्","च","छ","ज्","ज","झ्","झ","ञ",
    "ट्ट","ट्ठ","ड्ड","कृ","भ","्य","ड्ढ","झ्","क्र","त्त्","श","श्",
    "ॉ","ो","ौ","ा","ी","ु","ू","ृ","े","ै",
    "ं","ँ","ः","ॅ","ऽ","ऽ","ऽ","ऽ","्र","्","?","़",":",
    "‘","’","“","”",";","(",")","{","}","=","।",".","-","µ","॰",",","् ","/"
];

const uni_array_two = [
    "ñ","Q+Z","sas","aa",")Z","ZZ","‘","’","“","”",
    "å","ƒ","„","…","†","‡","ˆ","‰","Š","‹",
    "¶+","d+","[+k","[+","x+","T+","t+","M+","<+","Q+",";+","j+","u+",
    "Ùk","Ù","ä","–","—","é","™","=kk","f=k",

    "i","Ik","I","Q","¶","c","Ck","C","Hk","H","e","Ek","E",
    ";","¸","j","y","Yk","Y","G","o","Ok","O",
    "'k","'","\"k","\"","l","Lk","L","g",

function convertToKrutidev() {
    let modified_substring = document.getElementById("unicodeInput").value;
    if (!modified_substring.trim()) return;

    let text_size = modified_substring.length;
    let processed_text = "";
    let sthiti1 = 0, sthiti2 = 0, chale_chalo = 1;
    let max_text_size = 6000;

    while (chale_chalo == 1) {
        sthiti1 = sthiti2;
        if (sthiti2 < (text_size - max_text_size)) {
            sthiti2 += max_text_size;
            while (modified_substring.charAt(sthiti2) != ' ') { sthiti2--; }
        } else {
            sthiti2 = text_size;
            chale_chalo = 0;
        }

        let substr = modified_substring.substring(sthiti1, sthiti2);
        processed_text += convertUnicodeToKrutiChunk(substr);
    }

    document.getElementById("krutidevInput").value = processed_text;
}

function convertUnicodeToKrutiChunk(modified_substring) {
    if (modified_substring.trim() === "") return "";

    // First replace two-byte nukta varNa with one-byte nukta varNas
    modified_substring = modified_substring.replace(/फ़्/g, "¶+");
    modified_substring = modified_substring.replace(/क़/g, "d+");
    modified_substring = modified_substring.replace(/ख़/g, "[+k");
    modified_substring = modified_substring.replace(/ख़्/g, "[+");
    modified_substring = modified_substring.replace(/ग़/g, "x+");
    modified_substring = modified_substring.replace(/ज़्/g, "T+");
    modified_substring = modified_substring.replace(/ज़/g, "t+");
    modified_substring = modified_substring.replace(/ड़/g, "M+");
    modified_substring = modified_substring.replace(/ढ़/g, "<+");
    modified_substring = modified_substring.replace(/फ़/g, "Q+");
    modified_substring = modified_substring.replace(/य़/g, ";+");
    modified_substring = modified_substring.replace(/ऱ/g, "j+");
    modified_substring = modified_substring.replace(/ऩ/g, "u+");

    // Replace symbols
    let array_one_length = uni_array_one.length;
    for (let input_symbol_idx = 0; input_symbol_idx < array_one_length; input_symbol_idx++) {
        let idx = 0;
        while (idx != -1) {
            modified_substring = modified_substring.replace(uni_array_one[input_symbol_idx], uni_array_two[input_symbol_idx]);
            idx = modified_substring.indexOf(uni_array_one[input_symbol_idx]);
        }
    }

    // Handle "ि" (chhotee ee ki matra) - replace with "f" and correct position
    let position_of_f = modified_substring.indexOf("ि");
    while (position_of_f != -1) {
        let character_left_to_f = modified_substring.charAt(position_of_f - 1);
        modified_substring = modified_substring.replace(character_left_to_f + "ि", "f" + character_left_to_f);
        position_of_f = position_of_f - 1;
        while ((modified_substring.charAt(position_of_f - 1) == "्") && (position_of_f != 0)) {
            let charecter_left_to_half = modified_substring.charAt(position_of_f - 2);
            modified_substring = modified_substring.replace(charecter_left_to_half + "्f", "f" + charecter_left_to_half + "्");
            position_of_f = position_of_f - 2;
        }
        position_of_f = modified_substring.indexOf("ि", position_of_f + 1);
    }

    // Handle "िं" (badi ee ki matra)
    modified_substring = modified_substring.replace(/Ç/g, "fa");
    modified_substring = modified_substring.replace(/É/g, "र्fa");

    let position_of_ee = modified_substring.indexOf("िं");
    while (position_of_ee != -1) {
        let charecter_next_to_ee = modified_substring.charAt(position_of_ee + 2);
        let charecter_to_be_replaced = "िं" + charecter_next_to_ee;
        modified_substring = modified_substring.replace(charecter_to_be_replaced, charecter_next_to_ee + "fa");
        position_of_ee = modified_substring.indexOf("िं", position_of_ee + 2);
    }

    // Handle "र्" (half R / reph) - replace with "Z"
    let set_of_matras = "ािीुूृेैोौंःँॅ";
    let position_of_R = modified_substring.indexOf("र्");
    while (position_of_R > 0) {
        let probable_position_of_half_r = position_of_R - 1;
        let charecter_at_probable_position_of_half_r = modified_substring.charAt(probable_position_of_half_r);

        while (set_of_matras.indexOf(charecter_at_probable_position_of_half_r) >= 0) {
            probable_position_of_half_r = probable_position_of_half_r - 1;
            charecter_at_probable_position_of_half_r = modified_substring.charAt(probable_position_of_half_r);
        }

        let charecter_to_be_replaced = modified_substring.substring(probable_position_of_half_r, position_of_R + 2);
        let new_replacement_string = modified_substring.substring(probable_position_of_half_r, position_of_R) + "Z";
        modified_substring = modified_substring.replace(charecter_to_be_replaced, new_replacement_string);
        position_of_R = modified_substring.indexOf("र्");
    }

    // Fix "f" position for half letters
    let position_of_wrong_f = modified_substring.indexOf("f्");
    while (position_of_wrong_f != -1) {
        let consonent_next_to_wrong_f = modified_substring.charAt(position_of_wrong_f + 2);
        let charecter_to_be_replaced = "f्" + consonent_next_to_wrong_f;
        modified_substring = modified_substring.replace(charecter_to_be_replaced, "्" + consonent_next_to_wrong_f + "f");
        position_of_wrong_f = modified_substring.indexOf("f्", position_of_wrong_f + 2);
    }

    return modified_substring;
}


// ==================== UTILITY FUNCTIONS ====================

function clearKrutidev() { document.getElementById('krutidevInput').value = ''; }
function clearUnicode() { document.getElementById('unicodeInput').value = ''; }
function copyKrutidev() { let el = document.getElementById('krutidevInput'); el.select(); document.execCommand('copy'); }
function copyUnicode() { let el = document.getElementById('unicodeInput'); el.select(); document.execCommand('copy'); }
</script>
