<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📚 Books & Authors · Railway Exam Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f7 100%);
            color: #0f172a;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .hero {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            color: white;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "📖";
            font-size: 12rem;
            position: absolute;
            right: -20px;
            bottom: -40px;
            opacity: 0.08;
            pointer-events: none;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero h1 span {
            background: #f59e0b;
            font-size: 1rem;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 500;
        }

        .stats-row {
            display: flex;
            gap: 1.2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Filter Tabs */
        .filter-bar {
            background: white;
            border-radius: 80px;
            padding: 0.6rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #334155;
            font-family: inherit;
        }

        .filter-btn:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: #1e293b;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Question Grid */
        .questions-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Card */
        .question-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.25s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            border: 1px solid #e9edf2;
        }

        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.12);
            border-color: #cbd5e1;
        }

        .card-header {
            background: #f8fafc;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #eef2ff;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .q-id {
            font-weight: 700;
            background: #e6f0ff;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #1e40af;
        }

        .q-exam {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            color: #475569;
        }

        .category-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .cat-tag {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: #e2e8f0;
            color: #1e293b;
            font-weight: 500;
        }

        .cat-tag.sanskrit { background: #fef3c7; color: #92400e; }
        .cat-tag.indian { background: #dcfce7; color: #166534; }
        .cat-tag.foreign { background: #e0f2fe; color: #0369a1; }
        .cat-tag.autobiography { background: #fce7f3; color: #9d174d; }
        .cat-tag.rrb { background: #ffe4e6; color: #be123c; }
        .cat-tag.rpf { background: #e9e9ff; color: #3730a3; }

        .card-body {
            padding: 1.5rem;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #0f172a;
            line-height: 1.4;
        }

        .details {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 1rem;
            margin: 0.75rem 0;
        }

        .detail-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .label {
            font-weight: 700;
            min-width: 90px;
            color: #334155;
        }

        .answer {
            color: #065f46;
            font-weight: 600;
            background: #d1fae5;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .explanation {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #2d3a4b;
            border-top: 1px dashed #cbd5e1;
            padding-top: 0.75rem;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 2rem;
            color: #64748b;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            color: #5b6e8c;
            font-size: 0.8rem;
        }

        @media (max-width: 680px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 1.5rem; }
            .filter-bar { border-radius: 28px; }
            .filter-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>
            📚 Books & Authors 
            <span>Railway Exam Vault</span>
        </h1>
        <div class="stats-row">
            <div class="stat-badge">📖 Total: <span id="totalCount">0</span></div>
            <div class="stat-badge">🎯 7 Categories</div>
            <div class="stat-badge">✨ Color coded for easy memory</div>
        </div>
    </div>

    <!-- Dynamic filter tabs will be inserted here -->
    <div class="filter-bar" id="filterContainer"></div>

    <!-- Questions will be injected here -->
    <div id="questionsContainer" class="questions-grid">
        <div class="empty-state">📌 Loading 195+ previous year questions...</div>
    </div>
    <footer>
        ⚡ Based on RPF SI, RRB NTPC, ALP, JE PYQs | 📖 सभी प्रश्न पिछली परीक्षाओं पर आधारित
    </footer>
</div>

<!-- Data file (must be in same folder) -->
<script src="data.js"></script>

<script>
    (function() {
        // Ensure questionsData exists (from data.js)
        if (typeof questionsData === 'undefined') {
            document.getElementById('questionsContainer').innerHTML = '<div class="empty-state">❌ data.js not found. Please ensure data.js is in the same directory.</div>';
            return;
        }

        // ----- Helper: get unique categories from all questions -----
        const allQuestions = questionsData;
        const uniqueCategoriesSet = new Set();
        allQuestions.forEach(q => {
            if (q.category && Array.isArray(q.category)) {
                q.category.forEach(cat => uniqueCategoriesSet.add(cat));
            }
        });
        // sort and add "✨ All" as first option
        let categoryList = Array.from(uniqueCategoriesSet).sort();
        // Prettify some category names if needed
        const categoryMap = {
            "Sanskrit Texts": "🕉️ Sanskrit Texts",
            "Indian Authors": "🇮🇳 Indian Authors",
            "Foreign Authors": "🌍 Foreign Authors",
            "Autobiographies": "📖 Autobiographies",
            "RRB NTPC": "🚂 RRB NTPC",
            "RPF": "🛡️ RPF"
        };
        const displayCategories = ["✨ All", ...categoryList.map(c => categoryMap[c] || c)];

        // current active filter (store the raw category value, for 'All' it's null)
        let activeFilterRaw = null; // null means ALL

        // function to assign proper raw category from display text
        function getRawCategoryFromDisplay(displayText) {
            if (displayText === "✨ All") return null;
            // reverse mapping
            for (let [raw, pretty] of Object.entries(categoryMap)) {
                if (pretty === displayText) return raw;
            }
            return displayText; // fallback
        }

        // Render filter buttons
        const filterContainer = document.getElementById('filterContainer');
        function renderFilters() {
            filterContainer.innerHTML = '';
            displayCategories.forEach(displayCat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                if ((activeFilterRaw === null && displayCat === "✨ All") || 
                    (activeFilterRaw !== null && categoryMap[activeFilterRaw] === displayCat)) {
                    btn.classList.add('active');
                }
                btn.textContent = displayCat;
                btn.addEventListener('click', () => {
                    activeFilterRaw = getRawCategoryFromDisplay(displayCat);
                    renderFilters();    // re-render active style
                    renderQuestions();  // re-render cards
                });
                filterContainer.appendChild(btn);
            });
        }

        // Render question cards
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let filtered = [...allQuestions];
            
            if (activeFilterRaw !== null) {
                filtered = filtered.filter(q => q.category && q.category.includes(activeFilterRaw));
            }
            
            // update total count in hero
            document.getElementById('totalCount').innerText = filtered.length;
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">🧐 No questions match this category. Try another filter!</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(q => {
                // create category tags with proper styling
                let catsHtml = '';
                if (q.category && Array.isArray(q.category)) {
                    catsHtml = q.category.map(cat => {
                        let extraClass = '';
                        if (cat === 'Sanskrit Texts') extraClass = 'sanskrit';
                        else if (cat === 'Indian Authors') extraClass = 'indian';
                        else if (cat === 'Foreign Authors') extraClass = 'foreign';
                        else if (cat === 'Autobiographies') extraClass = 'autobiography';
                        else if (cat === 'RRB NTPC') extraClass = 'rrb';
                        else if (cat === 'RPF') extraClass = 'rpf';
                        return `<span class="cat-tag ${extraClass}">${cat}</span>`;
                    }).join('');
                }
                
                // exam source (default if missing)
                const examInfo = q.exam || (q.id ? `RRB NTPC / RPF Shift` : 'PYQ');
                
                html += `
                    <div class="question-card">
                        <div class="card-header">
                            <div class="q-id">📌 Q${q.id}</div>
                            <div class="q-exam">${examInfo}</div>
                            <div class="category-tags">${catsHtml}</div>
                        </div>
                        <div class="card-body">
                            <div class="question-text">📖 ${q.text || q.book ? q.book : 'प्रश्न'}</div>
                            <div class="details">
                                <div class="detail-row">
                                    <span class="label">✍️ लेखक / AUTHOR :</span>
                                    <span>${q.author || '—'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="label">📚 पुस्तक / BOOK :</span>
                                    <span>${q.book || '—'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="label">✔️ सही उत्तर :</span>
                                    <span class="answer">${q.answer || q.author || '✓'}</span>
                                </div>
                                ${q.explanation ? `<div class="explanation">📖 DEEP EXPLANATION<br>${q.explanation}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        // initial rendering
        renderFilters();
        renderQuestions();
    })();
</script>
</body>
</html>
