<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🏛️ Ancient History — प्राचीन इतिहास | Railway GK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a237e;
            --primary-dark: #0d1b4e;
            --secondary: #c62828;
            --accent: #ff6f00;
            --success: #2e7d32;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans Devanagari', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .breadcrumb {
            background: var(--card);
            padding: 0.9rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .breadcrumb a {
            text-decoration: none;
            color: var(--primary);
        }
        .subject-hero {
            background: linear-gradient(135deg, #8e24aa, #6a1b9a);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .subject-hero h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 1rem; }
        
        .topic-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .filter-chip {
            padding: 0.5rem 1.2rem;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .sets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.5rem;
        }
        .set-card {
            background: var(--card);
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .set-card:hover { transform: translateY(-3px); }
        .set-card.locked { opacity: 0.7; background: #f1f5f9; }
        .set-card.completed { border-left: 5px solid var(--success); }
        .set-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem 1.2rem 0.5rem 1.2rem;
        }
        .set-id {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .set-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            background: #eef2ff;
            color: var(--primary);
        }
        .set-badge.done { background: #e8f5e9; color: var(--success); }
        .set-title { padding: 0 1.2rem; }
        .set-title h3 { font-size: 1rem; margin-bottom: 0.2rem; }
        .set-title p { font-size: 0.8rem; color: var(--text-light); }
        .set-meta {
            display: flex;
            gap: 1rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 0.8rem 0;
        }
        .btn-set {
            margin: 0.8rem 1.2rem 1.2rem 1.2rem;
            width: calc(100% - 2.4rem);
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
        }
        .btn-set:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        .quiz-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 1rem;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 28px;
            position: relative;
        }
        .quiz-header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-radius: 28px 28px 0 0;
        }
        .quiz-timer {
            background: var(--secondary);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
        }
        .quiz-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.8rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }
        .palette-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            background: white;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .palette-btn.current { background: var(--accent); color: white; }
        .palette-btn.attempted { background: var(--primary); color: white; }
        .palette-btn.bookmarked { box-shadow: 0 0 0 2px var(--accent); }
        .question-text {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 16px;
            margin: 1rem 0;
            border-left: 4px solid var(--primary);
            font-size: 1rem;
        }
        .options-area { display: flex; flex-direction: column; gap: 0.8rem; margin: 1rem 0; }
        .option-item {
            padding: 0.9rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            gap: 12px;
        }
        .option-item:hover { border-color: var(--primary); background: #eef2ff; }
        .option-item.selected { border-color: var(--primary); background: #e8eaf6; }
        .option-item.correct-highlight { border-color: var(--success); background: #e8f5e9; }
        .option-item.wrong-highlight { border-color: var(--secondary); background: #ffebee; }
        .explanation-box {
            display: none;
            background: #fff8e1;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
            border-left: 5px solid var(--accent);
        }
        .explanation-box.show { display: block; }
        .quiz-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        .quiz-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            background: #e2e8f0;
        }
        .quiz-btn.primary { background: var(--primary); color: white; }
        .quiz-btn.accent { background: var(--accent); color: white; }
        .close-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.3);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
            z-index: 10;
        }
        .result-screen { text-align: center; padding: 2rem; }
        .result-stats { display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0; }
        @media (max-width: 550px) {
            .palette-grid { grid-template-columns: repeat(5, 1fr); }
            .quiz-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="breadcrumb">
        <a href="../index.html">🏠 Home</a> <span>›</span>
        <a href="#">🚂 Railway GK</a> <span>›</span>
        <strong>🏛️ Ancient History — प्राचीन इतिहास</strong>
    </div>

    <section class="subject-hero">
        <h1>🏛️ Ancient History — प्राचीन इतिहास</h1>
        <p>481 Questions • 12 Topic Sets • 25 Questions per Set</p>
    </section>

    <div class="container">
        <div class="topic-filters" id="topicFilters">
            <div class="filter-chip active" data-filter="all">📚 All Sets</div>
            <div class="filter-chip" data-filter="indus">🏺 Indus Valley</div>
            <div class="filter-chip" data-filter="vedic">📖 Vedic Period</div>
            <div class="filter-chip" data-filter="maurya">👑 Maurya Empire</div>
            <div class="filter-chip" data-filter="gupta">🛕 Gupta Period</div>
            <div class="filter-chip" data-filter="religion">🕉️ Buddhism & Jainism</div>
        </div>

        <div class="sets-grid" id="setsGrid"></div>
    </div>

    <div id="quizModal" class="quiz-modal">
        <div class="quiz-card">
            <div class="close-icon" onclick="closeQuiz()">✕</div>
            <div class="quiz-header">
                <div><strong id="quizSetTitle">Loading...</strong><br><small>प्रश्न <span id="currentQNumber">1</span> / <span id="totalQCount">25</span></small></div>
                <div class="quiz-timer" id="timerDisplay">25:00</div>
            </div>
            <div class="quiz-body" id="quizBody"></div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        // Load sets data from questionsDB
        let setsData = [];
        for (let key in questionsDB) {
            let set = questionsDB[key];
            setsData.push({
                id: set.id,
                topic: set.topic,
                name: set.name,
                nameHi: set.nameHi,
                qCount: set.questions.length,
                time: 25,
                difficulty: set.difficulty,
                completed: false,
                locked: key != 1,
                questions: set.questions
            });
        }
        if (setsData.length > 0) setsData[0].locked = false;

        let currentFilter = "all";
        let activeSet = null;
        let currentIndex = 0;
        let userAnswers = {};
        let bookmarked = new Set();
        let timerInterval = null;
        let timeSeconds = 0;
        let quizActive = false;

        function saveProgress() {
            let progress = {};
            setsData.forEach(set => { progress[set.id] = { completed: set.completed, locked: set.locked }; });
            localStorage.setItem("ancient_history_progress", JSON.stringify(progress));
        }

        function loadProgress() {
            let saved = localStorage.getItem("ancient_history_progress");
            if (saved) {
                let progress = JSON.parse(saved);
                setsData.forEach(set => {
                    if (progress[set.id]) {
                        set.completed = progress[set.id].completed;
                        set.locked = progress[set.id].locked;
                    }
                });
                for (let i = 1; i < setsData.length; i++) {
                    if (setsData[i-1].completed && setsData[i].locked === true) setsData[i].locked = false;
                }
            }
        }

        function renderSets() {
            let filtered = currentFilter === "all" ? setsData : setsData.filter(s => s.topic === currentFilter);
            const container = document.getElementById("setsGrid");
            container.innerHTML = filtered.map(set => `
                <div class="set-card ${set.locked ? 'locked' : ''} ${set.completed ? 'completed' : ''}">
                    <div class="set-header">
                        <div class="set-id">${set.id}</div>
                        <div class="set-badge ${set.completed ? 'done' : ''}">${set.completed ? '✅ Done' : (set.locked ? '🔒 Locked' : '🆕 New')}</div>
                    </div>
                    <div class="set-title">
                        <h3>${set.name}</h3>
                        <p>${set.nameHi}</p>
                    </div>
                    <div class="set-meta">
                        <span>📝 ${set.qCount} Q</span>
                        <span>⏱️ ${set.time} min</span>
                        <span>📊 ${set.difficulty}</span>
                    </div>
                    <button class="btn-set" data-id="${set.id}" ${set.locked ? 'disabled' : ''}>${set.completed ? '↻ Re-attempt' : '▶ Start Set'}</button>
                </div>
            `).join("");
            document.querySelectorAll(".btn-set").forEach(btn => {
                btn.addEventListener("click", () => startQuiz(parseInt(btn.dataset.id)));
            });
        }

        function startQuiz(setId) {
            activeSet = setsData.find(s => s.id === setId);
            if (!activeSet || activeSet.locked) return;
            currentIndex = 0;
            userAnswers = {};
            bookmarked.clear();
            quizActive = true;
            stopTimer();
            startTimer(activeSet.time * 60);
            renderQuizUI();
            document.getElementById("quizModal").style.display = "flex";
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        function startTimer(seconds) {
            timeSeconds = seconds;
            const timerEl = document.getElementById("timerDisplay");
            function update() {
                let mins = Math.floor(timeSeconds / 60);
                let secs = timeSeconds % 60;
                timerEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (timeSeconds <= 0) { stopTimer(); finishQuiz(true); }
            }
            update();
            timerInterval = setInterval(() => { if (timeSeconds > 0 && quizActive) { timeSeconds--; update(); } }, 1000);
        }

        function renderQuizUI() {
            const q = activeSet.questions[currentIndex];
            document.getElementById("quizSetTitle").innerHTML = `${activeSet.name} — ${activeSet.nameHi}`;
            document.getElementById("currentQNumber").innerText = currentIndex + 1;
            document.getElementById("totalQCount").innerText = activeSet.questions.length;
            const bodyDiv = document.getElementById("quizBody");
            let paletteHtml = `<div class="palette-grid" id="paletteGrid">`;
            for (let i = 0; i < activeSet.questions.length; i++) {
                let cls = "";
                if (i === currentIndex) cls = "current";
                else if (userAnswers[i] !== undefined) cls = "attempted";
                if (bookmarked.has(i)) cls += " bookmarked";
                paletteHtml += `<button class="palette-btn ${cls}" data-qidx="${i}">${i+1}</button>`;
            }
            paletteHtml += `</div>`;
            let optionsHtml = `<div class="options-area" id="optionsArea">`;
            ["a","b","c","d"].forEach(letter => {
                let optText = q.options[letter];
                let isSelected = userAnswers[currentIndex] === letter;
                optionsHtml += `<div class="option-item ${isSelected ? 'selected' : ''}" data-opt="${letter}"><strong>${letter.toUpperCase()}.</strong> ${optText}</div>`;
            });
            optionsHtml += `</div>`;
            let explanationHtml = `<div class="explanation-box" id="expBox"><strong>💡 व्याख्या:</strong><br><span id="expText">${q.explanation || 'उत्तर जाँचें'}</span></div>`;
            let actionsHtml = `<div class="quiz-actions">
                <button class="quiz-btn" id="prevBtn" ${currentIndex===0 ? 'disabled' : ''}>◀ पिछला</button>
                <button class="quiz-btn accent" id="bookmarkBtn">🔖 ${bookmarked.has(currentIndex) ? 'बुकमार्क हटाएँ' : 'बुकमार्क करें'}</button>
                <button class="quiz-btn primary" id="checkBtn">✓ जाँच करें</button>
                <button class="quiz-btn" id="nextBtn">अगला ▶</button>
            </div>`;
            bodyDiv.innerHTML = paletteHtml + `<div class="question-text">${q.question_hi}</div>` + optionsHtml + explanationHtml + actionsHtml;
            document.querySelectorAll(".palette-btn").forEach(btn => btn.addEventListener("click", (e) => { currentIndex = parseInt(btn.dataset.qidx); renderQuizUI(); }));
            document.querySelectorAll(".option-item").forEach(opt => opt.addEventListener("click", () => { if (!quizActive) return; userAnswers[currentIndex] = opt.dataset.opt; renderQuizUI(); }));
            document.getElementById("prevBtn").addEventListener("click", () => { if (currentIndex > 0) { currentIndex--; renderQuizUI(); } });
            document.getElementById("nextBtn").addEventListener("click", () => { if (currentIndex + 1 < activeSet.questions.length) { currentIndex++; renderQuizUI(); } else { finishQuiz(false); } });
            document.getElementById("checkBtn").addEventListener("click", () => {
                let qData = activeSet.questions[currentIndex];
                let userAns = userAnswers[currentIndex];
                let expBox = document.getElementById("expBox");
                document.getElementById("expText").innerHTML = qData.explanation || `सही उत्तर: ${qData.correct.toUpperCase()}`;
                expBox.classList.add("show");
                document.querySelectorAll(".option-item").forEach(opt => {
                    opt.classList.remove("correct-highlight", "wrong-highlight");
                    if (opt.dataset.opt === qData.correct) opt.classList.add("correct-highlight");
                    if (userAns && opt.dataset.opt === userAns && userAns !== qData.correct) opt.classList.add("wrong-highlight");
                });
            });
            document.getElementById("bookmarkBtn").addEventListener("click", () => {
                if (bookmarked.has(currentIndex)) bookmarked.delete(currentIndex);
                else bookmarked.add(currentIndex);
                renderQuizUI();
            });
        }

        function finishQuiz(isTimeout) {
            stopTimer(); quizActive = false;
            let correct = 0;
            activeSet.questions.forEach((q, idx) => { if (userAnswers[idx] === q.correct) correct++; });
            if (!activeSet.completed && correct >= 10) {
                activeSet.completed = true;
                if (activeSet.id < setsData.length) setsData[activeSet.id].locked = false;
                saveProgress();
                renderSets();
            }
            const bodyDiv = document.getElementById("quizBody");
            bodyDiv.innerHTML = `<div class="result-screen"><div style="font-size:3rem;">${correct >= 12 ? '🎉🏆' : '📚👍'}</div>
                <h3>सेट पूर्ण!</h3><div class="result-stats"><div><strong>✅ सही:</strong> ${correct}</div>
                <div><strong>❌ गलत:</strong> ${activeSet.questions.length - correct}</div>
                <div><strong>📊 शुद्धता:</strong> ${Math.round((correct/activeSet.questions.length)*100)}%</div></div>
                <button class="quiz-btn primary" onclick="closeQuiz()">✖ बंद करें</button></div>`;
        }

        function closeQuiz() { stopTimer(); quizActive = false; document.getElementById("quizModal").style.display = "none"; renderSets(); }

        document.querySelectorAll(".filter-chip").forEach(chip => chip.addEventListener("click", () => {
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
            currentFilter = chip.dataset.filter;
            renderSets();
        }));
        loadProgress();
        renderSets();
        window.closeQuiz = closeQuiz;
    </script>
</body>
</html>
